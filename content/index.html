<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>C-Webserver</title>
</head>
<body>
  <h1>C-Webserver is running</h1>
  <div id="time">Server time: waiting...</div>
</body>

<cs>
var timeDiv = GetById("time");
if (timeDiv is not null)
{
    timeDiv.InnerHtml = $"Server time: {Now:yyyy-MM-dd HH:mm:ss}";
}
</cs>
