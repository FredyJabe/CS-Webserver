name: Publish Single-File Executables

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            artifact_name: CWebserver-linux-x64
            output_name: CWebserver
          - rid: win-x64
            artifact_name: CWebserver-win-x64
            output_name: CWebserver.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish single-file
        run: |
          dotnet publish CWebserver.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./artifacts/${{ matrix.rid }}

      - name: Verify output exists
        run: test -f ./artifacts/${{ matrix.rid }}/${{ matrix.output_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./artifacts/${{ matrix.rid }}/${{ matrix.output_name }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CWebserver-linux-x64
          path: ./release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CWebserver-win-x64
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-main-${{ github.run_number }}
          name: Automated Main Build ${{ github.run_number }}
          generate_release_notes: true
          files: |
            ./release/CWebserver
            ./release/CWebserver.exe
