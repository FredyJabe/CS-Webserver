name: Publish Single-File Executables

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            artifact_name: CWebserver-linux-x64
            output_name: CWebserver
          - rid: win-x64
            artifact_name: CWebserver-win-x64
            output_name: CWebserver.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish single-file
        run: |
          dotnet publish CWebserver.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./artifacts/${{ matrix.rid }}

      - name: Verify output exists
        run: test -f ./artifacts/${{ matrix.rid }}/${{ matrix.output_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./artifacts/${{ matrix.rid }}/${{ matrix.output_name }}
          if-no-files-found: error
